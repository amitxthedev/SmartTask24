server.port=${PORT:8080}
spring.application.name=smarttask24

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/smarttask24?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss

app.jwt.secret=${JWT_SECRET:4a6f686e5061756c4a61636f62734d617269614c757279416e6472657757617465726d656c6f6e5365637265744b6579466f724a57545369676e696e67507572706f736573}
app.jwt.expiration-ms=86400000
app.jwt.remember-me-expiration-ms=2592000000

app.frontend.url=${FRONTEND_URL:http://localhost:5173}
app.backend.url=${BACKEND_URL:http://localhost:8080}
app.cors.origins=${CORS_ORIGINS:http://localhost:5173}

app.google.client-id=${GOOGLE_CLIENT_ID:}
app.github.client-id=${GITHUB_CLIENT_ID:}
app.github.client-secret=${GITHUB_CLIENT_SECRET:}

app.reminder.morning-hour=6
app.reminder.evening-hour=21

logging.level.com.smarttask24=DEBUG
logging.level.org.springframework.security=INFO
